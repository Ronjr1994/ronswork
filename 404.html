<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a09">
  <meta name="robots" content="noindex">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <title>Page not found — Ron's Work</title>
  <style>
    :root{--bg:#0a0a09;--cream:#f5f2ec;--acid:#d8ff3e;--line:rgba(245,242,236,.18)}
    *{box-sizing:border-box}
    html{background:var(--bg);color:var(--cream);font-family:Arial,sans-serif}
    body{min-height:100svh;margin:0;display:grid;place-items:center;padding:24px}
    main{width:min(760px,100%);padding:clamp(28px,7vw,72px);border:1px solid var(--line)}
    span{color:var(--acid);font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
    h1{margin:16px 0;font-size:clamp(3.4rem,12vw,8rem);line-height:.86;letter-spacing:-.07em}
    p{max-width:560px;color:#b9bab3;line-height:1.65}
    a{display:inline-block;margin-top:24px;padding:12px 15px;border:1px solid var(--line);color:var(--cream);text-decoration:none}
    a:hover,a:focus-visible{background:var(--acid);color:#0a0a09;outline:none}
  </style>
</head>
<body>
  <main>
    <span>404 · Page not found</span>
    <h1>This route is not part of the system.</h1>
    <p>The page may have moved or the address may be incomplete. Return to Ron's Work to continue.</p>
    <a href="./index.html">Return to Ron's Work</a>
  </main>
</body>
</html>
